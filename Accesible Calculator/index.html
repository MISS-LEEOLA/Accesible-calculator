<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <!--Responsive design-->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--SEO Meta Tags-->
    <meta name="description" content="Simple calculator web app that performs sum, product, difference and division of two numbers. Accessible and user-friendly.">
    <meta name="keywords" content="calculator, web app, JavaScript calculator, math tool, accessible calculator">
    <meta name="Author" content="Lindiwe Kapi">
    <title>Assignment 3 Q1</title>
    <!--Link CSS-->
    <link rel="stylesheet" href="style.css">
</head>
<body>
<!--Main content-->
<main id="main" class="container">
    <!--Page heading-->
    <h1>A Calculator</h1>
    <form action="">
        <!--Label for Name-->
        <label for="name">Employee Name:</label>
        <input id="name" type="text" placeholder="Enter employee name" aria-required="true">
        <!--Label for Surname-->
        <br>
        <label for="surname">Employee Surname:</label>
        <input id="surname" type="text" placeholder="Enter employee surname" aria-required="true">
        <!--Label for Daily Rate-->
        <br>
        <label for="dailyRate">Daily Rate:</label>
        <input id="dailyRate" type="number" placeholder="Enter daily rate" aria-required="true">
        <!--Label for Days Worked-->
        <br>
        <label for="daysWorked">Days Worked:</label>
        <input id="daysWorked" type="number" placeholder="Enter days worked" aria-required="true">
        <!--Accessible button-->
        <br>
        <button onclick="calculate()" aria-label="Calculate results">Calculate</button>
    </form>
    <!--Live region for screen readers-->
    <div id="output" aria-live="polite"></div>
</main>
<!-- JS file -->
<script src="script.js"></script>
</body>
